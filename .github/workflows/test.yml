---
name: Test

"on":
  workflow_call:

jobs:
  lint:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git diff --name-only dist/)" ] \
            || [ -n "$(git ls-files --others --exclude-standard dist/)" ]
          then
            echo "::error::dist/ is out of date."
            echo "Run 'npm run build' and commit."
            git diff --stat dist/
            git ls-files --others --exclude-standard dist/
            exit 1
          fi

  test-model:
    name: Test with model input
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - uses: ./
        id: proxy
        env:
          GEMINI_API_KEY: fake-key-for-testing
        with:
          model: gemini/gemini-3.1-pro
          timeout: '60'
      - name: Verify outputs are set
        run: |
          test -n "${STEPS_PROXY_OUTPUTS_BASE_URL}"
          test -n "${STEPS_PROXY_OUTPUTS_PID}"
        env:
          STEPS_PROXY_OUTPUTS_BASE_URL: ${{ steps.proxy.outputs.base-url }}
          STEPS_PROXY_OUTPUTS_PID: ${{ steps.proxy.outputs.pid }}
      - name: Verify health endpoint
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            "${STEPS_PROXY_OUTPUTS_BASE_URL}/health/readiness")
          echo "Health status: $status"
          test "$status" = "200"
        env:
          STEPS_PROXY_OUTPUTS_BASE_URL: ${{ steps.proxy.outputs.base-url }}
      - name: Verify models endpoint
        run: |
          curl -sf "${STEPS_PROXY_OUTPUTS_BASE_URL}/v1/models" | jq .
        env:
          STEPS_PROXY_OUTPUTS_BASE_URL: ${{ steps.proxy.outputs.base-url }}

  test-inline-config:
    name: Test with inline config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - uses: ./
        id: proxy
        env:
          GEMINI_API_KEY: fake-key-for-testing
        with:
          config: |
            model_list:
              - model_name: gemini-3.1-pro
                litellm_params:
                  model: gemini/gemini-3.1-pro
              - model_name: gemini-2.0-flash
                litellm_params:
                  model: gemini/gemini-2.0-flash
          timeout: '60'
      - name: Verify health endpoint
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            "${STEPS_PROXY_OUTPUTS_BASE_URL}/health/readiness")
          echo "Health status: $status"
          test "$status" = "200"
        env:
          STEPS_PROXY_OUTPUTS_BASE_URL: ${{ steps.proxy.outputs.base-url }}
      - name: Verify models endpoint
        run: |
          curl -sf "${STEPS_PROXY_OUTPUTS_BASE_URL}/v1/models" | jq .
        env:
          STEPS_PROXY_OUTPUTS_BASE_URL: ${{ steps.proxy.outputs.base-url }}

  test-config-path:
    name: Test with config file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - name: Create test config file
        run: |
          cat > "${{ runner.temp }}/litellm-config.yaml" << 'EOF'
          model_list:
            - model_name: gemini-3.1-pro
              litellm_params:
                model: gemini/gemini-3.1-pro
          EOF
      - uses: ./
        id: proxy
        env:
          GEMINI_API_KEY: fake-key-for-testing
        with:
          config-path: ${{ runner.temp }}/litellm-config.yaml
          timeout: '60'
      - name: Verify health endpoint
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            "${STEPS_PROXY_OUTPUTS_BASE_URL}/health/readiness")
          echo "Health status: $status"
          test "$status" = "200"
        env:
          STEPS_PROXY_OUTPUTS_BASE_URL: ${{ steps.proxy.outputs.base-url }}

  test-custom-port:
    name: Test with custom port
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - uses: ./
        id: proxy
        env:
          GEMINI_API_KEY: fake-key-for-testing
        with:
          model: gemini/gemini-3.1-pro
          port: '8080'
          timeout: '60'
      - name: Verify base URL uses custom port
        run: |
          echo "Base URL: ${STEPS_PROXY_OUTPUTS_BASE_URL}"
          echo "${STEPS_PROXY_OUTPUTS_BASE_URL}" | grep -q ":8080"
        env:
          STEPS_PROXY_OUTPUTS_BASE_URL: ${{ steps.proxy.outputs.base-url }}
      - name: Verify health endpoint
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            "${STEPS_PROXY_OUTPUTS_BASE_URL}/health/readiness")
          echo "Health status: $status"
          test "$status" = "200"
        env:
          STEPS_PROXY_OUTPUTS_BASE_URL: ${{ steps.proxy.outputs.base-url }}

  test-api-key:
    name: Test with API key authentication
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - uses: ./
        id: proxy
        env:
          GEMINI_API_KEY: fake-key-for-testing
        with:
          model: gemini/gemini-3.1-pro
          api-key: test-master-key-12345
          timeout: '60'
      - name: Verify authenticated request succeeds
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer test-master-key-12345" \
            "${STEPS_PROXY_OUTPUTS_BASE_URL}/v1/models")
          echo "Authenticated status: $status"
          test "$status" = "200"
        env:
          STEPS_PROXY_OUTPUTS_BASE_URL: ${{ steps.proxy.outputs.base-url }}
      - name: Verify unauthenticated request is rejected
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            "${STEPS_PROXY_OUTPUTS_BASE_URL}/v1/models")
          echo "Unauthenticated status: $status"
          test "$status" != "200"
        env:
          STEPS_PROXY_OUTPUTS_BASE_URL: ${{ steps.proxy.outputs.base-url }}
