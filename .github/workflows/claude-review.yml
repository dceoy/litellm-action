---
name: Claude PR Review

"on":
  pull_request:
    types: [opened]

jobs:
  review:
    name: PR Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Start LiteLLM proxy
        uses: dceoy/litellm-action@v0  # zizmor: ignore[unpinned-uses]
        id: litellm
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          api-key: sk-litellm
          config: |
            model_list:
              - model_name: claude-opus-4-6
                litellm_params:
                  model: gemini/gemini-3.1-pro-preview
                  api_key: os.environ/GEMINI_API_KEY
            litellm_settings:
              drop_params: true

      - name: PR Review with Claude via LiteLLM proxy
        uses: anthropics/claude-code-action@v1  # zizmor: ignore[unpinned-uses]
        env:
          ANTHROPIC_BASE_URL: ${{ steps.litellm.outputs.base-url }}
        with:
          anthropic_api_key: sk-litellm
          prompt: >-
            /review-pr REPO: ${{ github.repository }}
            PR_NUMBER: ${{ github.event.pull_request.number }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
            --model "claude-opus-4-6"
