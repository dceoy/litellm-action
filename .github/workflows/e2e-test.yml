---
name: E2E Test
on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-latest
    secrets:
      GEMINI_API_KEY:
        required: false
        description: API key for Google Gemini
      GH_TOKEN:
        required: false
        description: GitHub token for accessing the repository
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  e2e-test-with-model:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: false
      - name: Start LiteLLM proxy with model
        id: litellm
        uses: ./
        with:
          model: fake-openai-endpoint
          port: '4000'
          log-level: DEBUG
          timeout: '60'
      - name: Verify outputs
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
          STEPS_LITELLM_OUTPUTS_PID: ${{ steps.litellm.outputs.pid }}
        run: |
          echo "base-url: ${STEPS_LITELLM_OUTPUTS_BASE_URL}"
          echo "pid: ${STEPS_LITELLM_OUTPUTS_PID}"
          test -n "${STEPS_LITELLM_OUTPUTS_BASE_URL}"
          test -n "${STEPS_LITELLM_OUTPUTS_PID}"
      - name: Check health endpoint
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
        run: >
          curl -sf "${STEPS_LITELLM_OUTPUTS_BASE_URL}/health/readiness"
      - name: Check model list endpoint
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
        run: >
          curl -sf "${STEPS_LITELLM_OUTPUTS_BASE_URL}/v1/models"
  e2e-test-with-config:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: false
      - name: Start LiteLLM proxy with inline config
        id: litellm
        uses: ./
        with:
          config: |
            model_list:
              - model_name: fake-model
                litellm_params:
                  model: fake-openai-endpoint
          port: '4001'
          log-level: DEBUG
          timeout: '60'
      - name: Verify outputs
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
          STEPS_LITELLM_OUTPUTS_PID: ${{ steps.litellm.outputs.pid }}
        run: |
          echo "base-url: ${STEPS_LITELLM_OUTPUTS_BASE_URL}"
          echo "pid: ${STEPS_LITELLM_OUTPUTS_PID}"
          test -n "${STEPS_LITELLM_OUTPUTS_BASE_URL}"
          test -n "${STEPS_LITELLM_OUTPUTS_PID}"
      - name: Check health endpoint
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
        run: >
          curl -sf "${STEPS_LITELLM_OUTPUTS_BASE_URL}/health/readiness"
      - name: Check model list endpoint
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
        run: >
          curl -sf "${STEPS_LITELLM_OUTPUTS_BASE_URL}/v1/models"
