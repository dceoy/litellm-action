---
name: E2E Test
on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        description: Runner to use
        default: ubuntu-latest
      max-attempts:
        required: false
        type: number
        description: Maximum number of request attempts
        default: 5
    secrets:
      OPENROUTER_API_KEY:
        required: false
        description: API key for OpenRouter
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  e2e-test-with-model:
    runs-on: ${{ inputs.runs-on }}
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'sk-or-v1-dummy' }}
      OPENROUTER_SITE_URL: https://github.com/${{ github.repository }}
      OPENROUTER_APP_NAME: litellm-action-e2e-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Start LiteLLM proxy with model
        id: litellm
        uses: ./
        with:
          model: openrouter/openrouter/free
          port: '4000'
          log-level: DEBUG
          timeout: '60'
      - name: Verify outputs
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
          STEPS_LITELLM_OUTPUTS_PID: ${{ steps.litellm.outputs.pid }}
        run: |
          echo "base-url: ${STEPS_LITELLM_OUTPUTS_BASE_URL}"
          echo "pid: ${STEPS_LITELLM_OUTPUTS_PID}"
          test -n "${STEPS_LITELLM_OUTPUTS_BASE_URL}"
          test -n "${STEPS_LITELLM_OUTPUTS_PID}"
      - name: Check health endpoint
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
        run: >
          curl -sf "${STEPS_LITELLM_OUTPUTS_BASE_URL}/health/readiness"
      - name: Check model list endpoint
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
        run: >
          curl -sf "${STEPS_LITELLM_OUTPUTS_BASE_URL}/v1/models"
      - name: Request OpenRouter completion via LiteLLM (curl)
        id: request-openrouter-completion-with-model
        if: ${{ env.OPENROUTER_API_KEY != 'sk-or-v1-dummy' }}
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
          MAX_ATTEMPTS: ${{ inputs.max-attempts }}
          REQUEST_BODY: '{"model":"openrouter/openrouter/free","messages":[{"role":"user","content":"Reply with exactly: ok"}],"temperature":0,"max_tokens":64}'
        run: |
          delay=10
          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            echo "--- Attempt ${attempt}/${MAX_ATTEMPTS} ---"
            if response=$(curl -sS \
              "${STEPS_LITELLM_OUTPUTS_BASE_URL}/v1/chat/completions" \
              -H "Content-Type: application/json" \
              -d "${REQUEST_BODY}" 2>&1); then
              jq . <<<"${response}" || echo "${response}"
              if jq -er '.choices[0].message.content' <<<"${response}" >/dev/null 2>&1; then
                break
              fi
            else
              echo "${response}"
            fi
            if [[ ${attempt} -lt ${MAX_ATTEMPTS} ]]; then
              echo "Attempt ${attempt} failed; retrying in ${delay}s..."
              sleep "${delay}"
              delay=$((delay * 2))
            else
              echo "All ${MAX_ATTEMPTS} attempts failed."
              exit 1
            fi
          done
      - name: Skip OpenRouter completion test without secret
        if: ${{ env.OPENROUTER_API_KEY == 'sk-or-v1-dummy' }}
        run: >
          echo "OPENROUTER_API_KEY is not set; skipping completion test."
      - name: Dump LiteLLM proxy logs on failure
        if: ${{ failure() }}
        run: |
          for log_file in /tmp/litellm-proxy.log "${RUNNER_TEMP}/litellm-proxy.log"; do
            if [[ -f "${log_file}" ]]; then
              echo "::group::LiteLLM proxy logs (${log_file})"
              tail -n 400 "${log_file}"
              echo "::endgroup::"
              exit 0
            fi
          done
          echo "LiteLLM proxy log file was not found."
  e2e-test-with-config:
    runs-on: ${{ inputs.runs-on }}
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'sk-or-v1-dummy' }}
      OPENROUTER_SITE_URL: https://github.com/${{ github.repository }}
      OPENROUTER_APP_NAME: litellm-action-e2e-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Start LiteLLM proxy with inline config
        id: litellm
        uses: ./
        with:
          config: |
            model_list:
              - model_name: openrouter-free
                litellm_params:
                  model: openrouter/openrouter/free
                  api_key: os.environ/OPENROUTER_API_KEY
                  extra_headers:
                    HTTP-Referer: os.environ/OPENROUTER_SITE_URL
                    X-Title: os.environ/OPENROUTER_APP_NAME
          port: '4001'
          log-level: DEBUG
          timeout: '60'
      - name: Verify outputs
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
          STEPS_LITELLM_OUTPUTS_PID: ${{ steps.litellm.outputs.pid }}
        run: |
          echo "base-url: ${STEPS_LITELLM_OUTPUTS_BASE_URL}"
          echo "pid: ${STEPS_LITELLM_OUTPUTS_PID}"
          test -n "${STEPS_LITELLM_OUTPUTS_BASE_URL}"
          test -n "${STEPS_LITELLM_OUTPUTS_PID}"
      - name: Check health endpoint
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
        run: >
          curl -sf "${STEPS_LITELLM_OUTPUTS_BASE_URL}/health/readiness"
      - name: Check model list endpoint
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
        run: >
          curl -sf "${STEPS_LITELLM_OUTPUTS_BASE_URL}/v1/models"
      - name: Request OpenRouter completion via LiteLLM (curl)
        id: request-openrouter-completion-with-config
        if: ${{ env.OPENROUTER_API_KEY != 'sk-or-v1-dummy' }}
        env:
          STEPS_LITELLM_OUTPUTS_BASE_URL: ${{ steps.litellm.outputs.base-url }}
          MAX_ATTEMPTS: ${{ inputs.max-attempts }}
          REQUEST_BODY: '{"model":"openrouter-free","messages":[{"role":"user","content":"Reply with exactly: ok"}],"temperature":0,"max_tokens":64}'
        run: |
          delay=10
          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            echo "--- Attempt ${attempt}/${MAX_ATTEMPTS} ---"
            if response=$(curl -sS \
              "${STEPS_LITELLM_OUTPUTS_BASE_URL}/v1/chat/completions" \
              -H "Content-Type: application/json" \
              -d "${REQUEST_BODY}" 2>&1); then
              jq . <<<"${response}" || echo "${response}"
              if jq -er '.choices[0].message.content' <<<"${response}" >/dev/null 2>&1; then
                break
              fi
            else
              echo "${response}"
            fi
            if [[ ${attempt} -lt ${MAX_ATTEMPTS} ]]; then
              echo "Attempt ${attempt} failed; retrying in ${delay}s..."
              sleep "${delay}"
              delay=$((delay * 2))
            else
              echo "All ${MAX_ATTEMPTS} attempts failed."
              exit 1
            fi
          done
      - name: Skip OpenRouter completion test without secret
        if: ${{ env.OPENROUTER_API_KEY == 'sk-or-v1-dummy' }}
        run: >
          echo "OPENROUTER_API_KEY is not set; skipping completion test."
      - name: Dump LiteLLM proxy logs on failure
        if: ${{ failure() }}
        run: |
          for log_file in /tmp/litellm-proxy.log "${RUNNER_TEMP}/litellm-proxy.log"; do
            if [[ -f "${log_file}" ]]; then
              echo "::group::LiteLLM proxy logs (${log_file})"
              tail -n 400 "${log_file}"
              echo "::endgroup::"
              exit 0
            fi
          done
          echo "LiteLLM proxy log file was not found."
