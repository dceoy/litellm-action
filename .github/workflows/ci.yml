---
name: CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  release:
    types:
      - released
  workflow_dispatch:  # checkov:skip=CKV_GHA_7:workflow_dispatch inputs are required for manual runs
    inputs:
      workflow:
        required: true
        type: choice
        options:
          - lint-and-test
          - update
        description: Choose the workflow to run
        default: lint-and-test
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  typescript-lint-and-test:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && inputs.workflow == 'lint-and-test')
    permissions:
      contents: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/typescript-package-script.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      package-scripts: lint,typecheck,format:check,test
      package-path: .
      node-version: latest
      audit: true
  github-actions-lint-and-scan:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && inputs.workflow == 'lint-and-test')
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-actions-lint-and-scan.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      search-path: .github/workflows
  github-actions-e2e-test:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && inputs.workflow == 'lint-and-test')
    permissions:
      contents: read
    uses: ./.github/workflows/e2e-test.yml
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  github-codeql-analysis:
    if: >
      github.event_name == 'push'
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-codeql-analysis.yml@main   # zizmor: ignore[unpinned-uses]
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      language: >
        ["javascript"]
  github-major-version-tag:
    if: >
      (github.event_name == 'release' && github.event.action == 'released')
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-major-version-tag.yml@main  # zizmor: ignore[unpinned-uses]
  build-and-update-dist:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || (github.event_name == 'workflow_dispatch' && inputs.workflow == 'update')
    needs:
      - typescript-lint-and-test
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: latest
      - name: Install pnpm
        run: >
          npm install -g pnpm
      - name: Install dependencies
        run: >
          pnpm install --frozen-lockfile
      - name: Apply audit fixes
        run: >
          pnpm run audit:fix
      - name: Build the project
        run: >
          pnpm run build
      - name: Format the generated files
        run: >
          pnpm format
      - name: Lint the generated files
        run: >
          pnpm lint:fix
      - name: Run type checks
        run: >
          pnpm run typecheck
      - name: Run tests
        run: >
          pnpm run test
      - name: Commit and push the changes
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5  # v9.1.4
        with:
          add: ./dist ./package.json ./pnpm-lock.yaml
          message: Update dist and dependency files
          push: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
  dependabot-auto-merge:
    if: >
      github.event_name == 'pull_request'
      && github.event.pull_request.user.login == 'dependabot[bot]'
    needs:
      - typescript-lint-and-test
      - github-actions-lint-and-scan
      - build-and-update-dist
    permissions:
      contents: write
      pull-requests: write
      actions: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/dependabot-auto-merge.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      unconditional: true
